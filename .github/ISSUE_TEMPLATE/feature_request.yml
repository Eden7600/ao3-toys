name: Feature request
description: Suggest an idea or improvement for AO3 Toys
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please check [existing issues](https://github.com/Eden7600/ao3-toys/issues) first to see if it's already been requested.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Is your request related to a frustration or limitation you've run into? Describe it.
      placeholder: "I'm always annoyed when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What would you like AO3 Toys to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches or workarounds you've thought about or tried.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, mockups, or links to similar features elsewhere.
    validations:
      required: false
