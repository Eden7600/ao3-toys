name: Bug report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please check [existing issues](https://github.com/Eden7600/ao3-toys/issues) first to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: AO3 Toys version
      description: Found on the Welcome page of the extension's options, or in the extension's details page in your browser.
      placeholder: e.g. 3.1.0
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Brave
        - Other Chromium-based
        - Other
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: e.g. 126.0.6478.126
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The more precise, the faster this can be fixed.
      placeholder: |
        1. Go to '...'
        2. Enable setting '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or console errors
      description: If applicable, add screenshots or paste any errors from the browser console (right-click the page → Inspect → Console).
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — relevant settings, other extensions installed, etc.
    validations:
      required: false
