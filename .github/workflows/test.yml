name: Test

on:
  push:
    branches-ignore: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    name: Test, typecheck, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm types

      - name: Lint
        run: pnpm lint
